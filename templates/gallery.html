{% extends 'base.html' %}
{% block title %}Gallery | Moments Photography{% endblock %}
{% block content %}
<section style="padding:120px 60px 60px;background:#111;min-height:100vh;">
  <h1 style="font-family:'Playfair Display',serif;font-size:48px;margin-bottom:20px;color:#fff;">Gallery</h1>
  <p style="max-width:700px;font-size:16px;line-height:1.8;color:#ccc;">A selection of moments captured with warmth, composition, and emotion.</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:40px;">
    <img src="{{ url_for('static', filename='images/ww.jpg') }}" alt="Wedding" style="width:100%;height:220px;object-fit:cover;border-radius:8px;"/>
    <img src="{{ url_for('static', filename='images/yy.jpg') }}" alt="Portrait" style="width:100%;height:220px;object-fit:cover;border-radius:8px;"/>
    <img src="{{ url_for('static', filename='images/c.png') }}" alt="Couple" style="width:100%;height:220px;object-fit:cover;border-radius:8px;"/>
  </div>
</section>
{% endblock %}
